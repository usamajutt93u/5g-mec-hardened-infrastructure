apiVersion: apps/v1
kind: Deployment
metadata:
  name: cnf-gateway
  namespace: default
  labels:
    app: cnf-gateway
    tier: data-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cnf-gateway
  template:
    metadata:
      labels:
        app: cnf-gateway
    spec:
      containers:
      - name: gateway-engine
        image: nginx:alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
